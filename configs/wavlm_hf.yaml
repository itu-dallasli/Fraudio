# WavLM Base+ — Hugging Face data source.
# Uses `Bisher/ASVspoof_2019_LA` directly via `datasets.load_dataset`.
# No manual download required; HF cache stores parquet shards.
experiment_name: wavlm_base_plus_hf
seed: 42

model:
  encoder_name: microsoft/wavlm-base-plus
  hidden_size: 768
  proj_dim: 256
  num_classes: 2
  dropout: 0.3
  freeze_encoder: false
  unfreeze_last_n_layers: 4

data:
  source: huggingface
  hf_repo: Bisher/ASVspoof_2019_LA
  streaming: false            # set true to avoid the ~7.5 GB cache (no len, no balanced sampler)
  sample_rate: 16000
  duration_seconds: 4.0
  trim_silence: false
  normalize_waveform: true
  max_train_samples: null
  max_dev_samples: null
  max_eval_samples: null
  num_workers: 2

augmentation:
  enabled: true
  gaussian_noise_prob: 0.5
  gaussian_noise_std: 0.005
  random_gain_prob: 0.5
  gain_db_range: [-6.0, 6.0]
  time_shift_prob: 0.5
  time_shift_max_ratio: 0.1
  reverb_prob: 0.2
  # OOD-robustness augs — mimic browser/phone capture artefacts so the model
  # stops flagging codec-relayed bonafide speech as spoof.
  bandpass_prob: 0.35
  bandpass_range_hz: [200.0, 400.0, 3000.0, 3800.0]   # [low_min, low_max, high_min, high_max]
  mulaw_prob: 0.25
  mulaw_bits_choices: [8, 8, 10, 12]

training:
  batch_size: 16
  grad_accum_steps: 1
  # Previous 8-epoch run was already over-fit to ASVspoof's clean studio
  # distribution by epoch 5 (dev EER bottomed at epoch 5–6, then drifted).
  # 4 epochs + label smoothing keeps the model from latching onto dataset
  # artefacts that don't generalise to browser/microphone captures.
  epochs: 4
  encoder_lr: 2.0e-5
  head_lr: 5.0e-4
  weight_decay: 1.0e-4
  warmup_ratio: 0.05
  grad_clip: 1.0
  mixed_precision: true
  class_weighting: none
  use_balanced_sampler: true
  label_smoothing: 0.10
  streaming_steps_per_epoch: 2000
  log_every: 50
  save_dir: checkpoints/wavlm_hf
  output_dir: outputs/wavlm_hf

inference:
  # Decision threshold above which the fused spoof probability is called SPOOF.
  # The training prior is ~1:9 bonafide:spoof, so the model leans spoof by default —
  # bumping the threshold above 0.5 reclaims false positives on real-world audio.
  decision_threshold: 0.65
  # |fused − decision_threshold| < margin → UNCERTAIN
  uncertainty_margin: 0.12
  # Final confidence (= 2·|fused − decision_threshold|) below this → UNCERTAIN
  min_confidence: 0.45
  # If the two encoders disagree and |P1 − P2| ≥ this → UNCERTAIN
  disagreement_margin: 0.30
