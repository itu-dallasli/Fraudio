# Wav2Vec2 Base — Hugging Face data source (Bisher/ASVspoof_2019_LA).
experiment_name: wav2vec2_base_hf
seed: 42

model:
  encoder_name: facebook/wav2vec2-base
  hidden_size: 768
  proj_dim: 256
  num_classes: 2
  dropout: 0.3
  freeze_encoder: false
  unfreeze_last_n_layers: 4

data:
  source: huggingface
  hf_repo: Bisher/ASVspoof_2019_LA
  streaming: false
  sample_rate: 16000
  duration_seconds: 4.0
  trim_silence: false
  normalize_waveform: true
  max_train_samples: null
  max_dev_samples: null
  max_eval_samples: null
  num_workers: 2

augmentation:
  enabled: true
  gaussian_noise_prob: 0.5
  gaussian_noise_std: 0.005
  random_gain_prob: 0.5
  gain_db_range: [-6.0, 6.0]
  time_shift_prob: 0.5
  time_shift_max_ratio: 0.1
  reverb_prob: 0.2
  bandpass_prob: 0.35
  bandpass_range_hz: [200.0, 400.0, 3000.0, 3800.0]
  mulaw_prob: 0.25
  mulaw_bits_choices: [8, 8, 10, 12]

training:
  batch_size: 16
  grad_accum_steps: 1
  epochs: 4
  encoder_lr: 2.0e-5
  head_lr: 5.0e-4
  weight_decay: 1.0e-4
  warmup_ratio: 0.05
  grad_clip: 1.0
  mixed_precision: true
  class_weighting: none
  use_balanced_sampler: true
  label_smoothing: 0.10
  streaming_steps_per_epoch: 2000
  log_every: 50
  save_dir: checkpoints/wav2vec2_hf
  output_dir: outputs/wav2vec2_hf

inference:
  decision_threshold: 0.65
  uncertainty_margin: 0.12
  min_confidence: 0.45
  disagreement_margin: 0.30
